# AI RAG System Configuration

######################### Mandatory Configuration #########################

# Azure OpenAI Configuration in case you want to use Azure OpenAI
azure:
  api_version: 2025-04-01-preview
  deployment: model
  embedding_deployment: text-embedding-3-small

# Gemini Configuration in case you want to use Gemini
gemini:
  model: gemini-1.5-flash
  embedding_model: models/embedding-001

# Provider Configuration
# Set to 'azure' or 'gemini' to choose the AI provider you previsouly set (above)
providers:
  llm: "gemini" # or "azure"
  embeddings: "gemini" # or "azure"

######################### Optional Configuration #########################


# Vector Store Configuration
vector_store:
  index_path: "vector_store_azure/faiss.index"
  metadata_path: "vector_store_azure/metadata.pkl"

# Embedding Models Configuration
embeddings:
  # Azure OpenAI Embeddings
  azure:
    dimension: 1536
    chunk_size: 1000
  
  # Gemini Embeddings
  gemini:
    dimension: 768

# Language Models Configuration
llm:
  # Azure OpenAI LLM
  azure:
    temperature: 0.7
    max_tokens: 500
  
  # Gemini LLM
  gemini:
    temperature: 0.7
    top_p: 0.95
    max_output_tokens: 500

# Document Processing Configuration
document_loader:
  chunk_size: 1000
  chunk_overlap: 200
  docs_directory: "docs"

# AI Service Configuration
ai_service:
  system_prompt: "You are a helpful assistant that answers questions based on the provided documentation."
  default_k: 3

